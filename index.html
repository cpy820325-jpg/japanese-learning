<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語学習システム</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'YuGothic', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container {
            max-width: 900px; margin: 0 auto; background: white;
            border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 28px; text-align: center;
        }
        .header h1 { font-size: 26px; margin-bottom: 6px; }
        .header p { opacity: 0.85; font-size: 13px; }
        .content { padding: 28px; }

        /* ログイン */
        .login-screen { text-align: center; }
        .login-screen h2 { margin-bottom: 28px; color: #333; font-size: 22px; }
        .login-buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .login-btn {
            padding: 18px 40px; font-size: 18px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; min-width: 140px; transition: all 0.2s;
        }
        .student-btn { background: #667eea; color: white; }
        .student-btn:hover { background: #5568d3; transform: translateY(-2px); }
        .teacher-btn { background: #f093fb; color: white; }
        .teacher-btn:hover { background: #da82e8; transform: translateY(-2px); }

        /* ユーザーバー */
        .user-bar {
            background: #f5f5f5; padding: 12px 18px; border-radius: 8px;
            margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center;
        }
        .user-name { font-weight: bold; color: #333; }
        .logout-btn {
            padding: 7px 18px; background: #e74c3c; color: white;
            border: none; border-radius: 5px; cursor: pointer; font-size: 13px;
        }
        .logout-btn:hover { background: #c0392b; }

        /* トピック */
        .main-screen, .exercise-screen { display: none; }
        .section-title {
            font-size: 19px; font-weight: bold; margin-bottom: 18px; color: #333;
            border-bottom: 3px solid #667eea; padding-bottom: 8px;
        }
        .add-form { display: flex; gap: 10px; margin-bottom: 20px; }
        .add-form input {
            flex: 1; padding: 11px; border: 1px solid #ddd;
            border-radius: 5px; font-size: 14px;
        }
        .add-form button {
            padding: 11px 22px; background: #667eea; color: white;
            border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .add-form button:hover { background: #5568d3; }
        .topics-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px;
        }
        .topic-card {
            background: #f9f9f9; border: 2px solid #ddd; border-radius: 8px;
            padding: 18px; cursor: pointer; transition: all 0.2s; text-align: center;
        }
        .topic-card:hover { border-color: #667eea; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.2); }
        .topic-name { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 6px; }
        .topic-date { font-size: 12px; color: #999; }

        /* 練習画面 */
        .back-btn {
            padding: 9px 18px; background: #95a5a6; color: white;
            border: none; border-radius: 5px; cursor: pointer; margin-bottom: 18px;
        }
        .back-btn:hover { background: #7f8c8d; }
        .topic-header {
            background: #f5f5f5; padding: 18px; border-radius: 8px; margin-bottom: 24px;
        }
        .topic-header h2 { color: #333; margin-bottom: 10px; }
        .add-exercise-btn {
            padding: 10px 22px; background: #27ae60; color: white;
            border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .add-exercise-btn:hover { background: #229954; }
        .exercises-list { display: grid; gap: 18px; }
        .exercise-card {
            border: 1px solid #ddd; border-radius: 8px; padding: 18px; background: #fafafa;
        }
        .exercise-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid #eee;
        }
        .exercise-title { font-weight: bold; color: #667eea; font-size: 15px; }
        .header-btns { display: flex; gap: 8px; }
        .rename-btn {
            padding: 5px 12px; background: #f39c12; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .rename-btn:hover { background: #d68910; }
        .del-btn {
            padding: 5px 12px; background: #e74c3c; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .del-btn:hover { background: #c0392b; }

        /* 音声セクション */
        .audio-section { margin-bottom: 20px; }
        .part-label { font-weight: bold; color: #555; font-size: 13px; margin-bottom: 10px; }
        .audio-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
        .play-btn {
            padding: 8px 16px; background: #667eea; color: white;
            border: none; border-radius: 5px; cursor: pointer; font-size: 13px;
        }
        .play-btn:hover { background: #5568d3; }
        .play-btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .rec-btn {
            padding: 8px 16px; background: #27ae60; color: white;
            border: none; border-radius: 5px; cursor: pointer; font-size: 13px;
        }
        .rec-btn:hover { background: #229954; }
        .rec-btn.recording { background: #e74c3c; animation: pulse 1s infinite; }
        .rec-btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
        .speed-row { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
        .speed-row span { font-size: 12px; color: #888; }
        .spd-btn {
            padding: 4px 10px; background: #ecf0f1; border: 1px solid #bdc3c7;
            border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .spd-btn.active { background: #667eea; color: white; border-color: #667eea; }
        .text-display {
            background: white; padding: 10px 12px; border-radius: 5px; border: 1px solid #ddd;
            color: #333; line-height: 1.6; cursor: pointer; transition: all 0.2s; word-break: break-word;
            margin-top: 8px;
        }
        .text-display:hover { border-color: #667eea; background: #f9f9f9; }
        .text-display.empty { color: #aaa; font-style: italic; }
        .text-edit-row { display: flex; gap: 8px; margin-top: 6px; }
        .text-ok-btn {
            padding: 7px 18px; background: #27ae60; color: white;
            border: none; border-radius: 5px; cursor: pointer; font-size: 13px;
        }
        .text-ok-btn:hover { background: #229954; }
        .text-cancel-btn {
            padding: 7px 18px; background: #95a5a6; color: white;
            border: none; border-radius: 5px; cursor: pointer; font-size: 13px;
        }
        .text-cancel-btn:hover { background: #7f8c8d; }
        textarea.text-input {
            width: 100%; padding: 10px; border: 1px solid #667eea; border-radius: 5px;
            font-size: 14px; font-family: inherit; resize: vertical; min-height: 44px; margin-top: 8px;
        }

        .msg-box { padding: 12px 16px; border-radius: 5px; margin-bottom: 16px; border-left: 4px solid; }
        .msg-box.success { background: #e5ffe5; color: #27ae60; border-color: #27ae60; }
        .msg-box.error   { background: #ffe5e5; color: #c0392b; border-color: #c0392b; }
        .empty-state { text-align: center; padding: 36px; color: #aaa; }
        .loading { text-align: center; padding: 20px; color: #667eea; font-weight: bold; }

        @media(max-width:600px){
            .content { padding: 16px; }
            .topics-grid { grid-template-columns: 1fr 1fr; }
            .login-buttons { flex-direction: column; }
            .login-btn { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎌 日本語学習システム</h1>
        <p>先生と一緒に日本語を学びます</p>
    </div>
    <div class="content">

        <!-- ログイン -->
        <div id="loginScreen" class="login-screen">
            <h2>身分を選んでください</h2>
            <div class="login-buttons">
                <button class="login-btn student-btn" onclick="login('student')">📚 学生</button>
                <button class="login-btn teacher-btn" onclick="login('teacher')">👨‍🏫 先生</button>
            </div>
        </div>

        <!-- メイン（トピック一覧） -->
        <div id="mainScreen" class="main-screen">
            <div class="user-bar">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="logout()">ログアウト</button>
            </div>
            <h2 class="section-title">📖 学習テーマ</h2>
            <div class="add-form">
                <input type="text" id="topicInput" placeholder="新しいテーマ名を入力..." />
                <button onclick="addTopic()">追加</button>
            </div>
            <div id="topicsList" class="topics-grid"></div>
            <div id="msgMain"></div>
        </div>

        <!-- 練習画面 -->
        <div id="exerciseScreen" class="exercise-screen">
            <button class="back-btn" onclick="backToTopics()">← テーマに戻る</button>
            <div class="topic-header">
                <h2 id="topicTitle"></h2>
                <button class="add-exercise-btn" onclick="addExercise()">＋ 練習を追加</button>
            </div>
            <div id="msgExercise"></div>
            <div id="exercisesList" class="exercises-list"></div>
        </div>

    </div>
</div>
<script>
const GAS = 'https://script.google.com/macros/s/AKfycbw5k_MEfd6WQfazoX-dyxKsgndl4a2Ws9osFPLsx5Bj_kBrd4Vkzjw_jPC4b-Y_g3dz/exec';

let user = null;
let topic = null;
let speed = 1;

// 録音状態
const R = { active: false, recorder: null, chunks: [], btn: null, exId: null, aType: null };

// ---- ユーティリティ ----
function msg(text, type, id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = `<div class="msg-box ${type}">${text}</div>`;
    setTimeout(() => { if (el) el.innerHTML = ''; }, 3000);
}

async function api(params) {
    const res = await fetch(GAS, { method: 'POST', body: JSON.stringify(params) });
    return res.json();
}

// ---- ログイン ----
function login(role) {
    user = { role, name: role === 'student' ? '学生' : '先生' };
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    document.getElementById('userName').textContent = '身分: ' + user.name;
    loadTopics();
}
function logout() {
    user = null;
    document.getElementById('mainScreen').style.display = 'none';
    document.getElementById('exerciseScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'block';
}

// ---- トピック ----
async function loadTopics() {
    const list = document.getElementById('topicsList');
    list.innerHTML = '<div class="loading">読み込み中...</div>';
    try {
        const d = await api({ action: 'getTopics' });
        list.innerHTML = '';
        if (!d.success) { msg('エラー: ' + d.error, 'error', 'msgMain'); return; }
        if (!d.data.length) { list.innerHTML = '<div class="empty-state">テーマがありません</div>'; return; }
        d.data.forEach(t => {
            const card = document.createElement('div');
            card.className = 'topic-card';
            card.innerHTML = `<div class="topic-name">${t.name}</div><div class="topic-date">${t.createdDate || ''}</div>`;
            card.onclick = () => openTopic(t.id, t.name);
            list.appendChild(card);
        });
    } catch(e) { msg('エラー: ' + e.message, 'error', 'msgMain'); }
}

async function addTopic() {
    const name = document.getElementById('topicInput').value.trim();
    if (!name) { msg('テーマ名を入力してください', 'error', 'msgMain'); return; }
    try {
        const d = await api({ action: 'addTopic', topicName: name });
        if (d.success) { document.getElementById('topicInput').value = ''; loadTopics(); }
        else msg('エラー: ' + d.error, 'error', 'msgMain');
    } catch(e) { msg('エラー: ' + e.message, 'error', 'msgMain'); }
}

function openTopic(id, name) {
    topic = { id, name };
    document.getElementById('topicTitle').textContent = name;
    document.getElementById('mainScreen').style.display = 'none';
    document.getElementById('exerciseScreen').style.display = 'block';
    loadExercises();
}
function backToTopics() {
    topic = null;
    document.getElementById('exerciseScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    loadTopics();
}

// ---- 練習 ----
async function loadExercises() {
    const list = document.getElementById('exercisesList');
    list.innerHTML = '<div class="loading">読み込み中...</div>';
    try {
        const d = await api({ action: 'getExercises', topicId: topic.id });
        list.innerHTML = '';
        if (!d.success) { msg('エラー: ' + d.error, 'error', 'msgExercise'); return; }
        if (!d.data.length) { list.innerHTML = '<div class="empty-state">練習がありません。追加してください</div>'; return; }
        d.data.forEach((ex, i) => list.appendChild(makeCard(ex, i + 1)));
    } catch(e) { msg('エラー: ' + e.message, 'error', 'msgExercise'); }
}

async function addExercise() {
    try {
        const d = await api({ action: 'addExercise', topicId: topic.id });
        if (d.success) { msg('練習を追加しました', 'success', 'msgExercise'); loadExercises(); }
        else msg('エラー: ' + d.error, 'error', 'msgExercise');
    } catch(e) { msg('エラー: ' + e.message, 'error', 'msgExercise'); }
}

function makeCard(ex, num) {
    const isStudent = user.role === 'student';
    const exName = ex.exerciseName || ('練習 ' + num);
    const card = document.createElement('div');
    card.className = 'exercise-card';

    card.innerHTML = `
        <div class="exercise-header">
            <span class="exercise-title">${exName}</span>
            <div class="header-btns">
                <button class="rename-btn">✏️ 名前変更</button>
                <button class="del-btn">削除</button>
            </div>
        </div>

        <!-- 学生音声 -->
        <div class="audio-section">
            <div class="part-label">${isStudent ? '📝 私の日本語' : '📝 学生の日本語'}</div>
            <div class="audio-row">
                <button class="play-btn" ${!ex.studentAudio ? 'disabled' : ''} data-audio="${ex.studentAudio || ''}">🔊 再生</button>
                ${isStudent ? '<button class="rec-btn" data-type="student">🎤 録音</button>' : ''}
            </div>
            <div class="speed-row">
                <span>速度:</span>
                <button class="spd-btn" data-r="0.5">0.5x</button>
                <button class="spd-btn" data-r="0.75">0.75x</button>
                <button class="spd-btn active" data-r="1">1x</button>
                <button class="spd-btn" data-r="1.25">1.25x</button>
                <button class="spd-btn" data-r="1.5">1.5x</button>
                <button class="spd-btn" data-r="2">2x</button>
            </div>
            <div class="text-display ${!ex.studentText ? 'empty' : ''}" data-type="student">${ex.studentText || 'クリックして入力'}</div>
        </div>

        <!-- 先生音声 -->
        <div class="audio-section">
            <div class="part-label">${isStudent ? '✏️ 先生の修正版' : '✏️ 私の修正版'}</div>
            <div class="audio-row">
                <button class="play-btn" ${!ex.teacherAudio ? 'disabled' : ''} data-audio="${ex.teacherAudio || ''}">🔊 再生</button>
                ${!isStudent ? '<button class="rec-btn" data-type="teacher">🎤 録音</button>' : ''}
            </div>
            <div class="speed-row">
                <span>速度:</span>
                <button class="spd-btn" data-r="0.5">0.5x</button>
                <button class="spd-btn" data-r="0.75">0.75x</button>
                <button class="spd-btn active" data-r="1">1x</button>
                <button class="spd-btn" data-r="1.25">1.25x</button>
                <button class="spd-btn" data-r="1.5">1.5x</button>
                <button class="spd-btn" data-r="2">2x</button>
            </div>
            <div class="text-display ${!ex.teacherText ? 'empty' : ''}" data-type="teacher">${ex.teacherText || (isStudent ? '先生はまだ入力していません' : 'クリックして入力')}</div>
        </div>
    `;

    // 削除
    card.querySelector('.del-btn').onclick = async () => {
        if (!confirm('この練習を削除しますか？')) return;
        const d = await api({ action: 'deleteExercise', topicId: topic.id, exerciseId: ex.exerciseId });
        if (d.success) { msg('削除しました', 'success', 'msgExercise'); loadExercises(); }
        else msg('エラー: ' + d.error, 'error', 'msgExercise');
    };

    // 名前変更
    card.querySelector('.rename-btn').onclick = async () => {
        const name = prompt('新しい名前:', exName);
        if (!name || !name.trim()) return;
        const d = await api({ action: 'updateExercise', topicId: topic.id, exerciseId: ex.exerciseId, field: 'exerciseName', value: name.trim() });
        if (d.success) { msg('名前を変更しました', 'success', 'msgExercise'); loadExercises(); }
        else msg('エラー: ' + d.error, 'error', 'msgExercise');
    };

    // 再生
    card.querySelectorAll('.play-btn').forEach(btn => {
        btn.onclick = () => {
            const b64 = btn.dataset.audio;
            if (!b64) { msg('音声がまだありません', 'error', 'msgExercise'); return; }
            // base64 → Blob → ObjectURL で再生（最も確実）
            const binary = atob(b64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            const blob = new Blob([bytes], { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.playbackRate = speed;
            audio.onended = () => URL.revokeObjectURL(url);
            audio.play().catch(e => msg('再生エラー: ' + e.message, 'error', 'msgExercise'));
        };
    });

    // 速度
    card.querySelectorAll('.spd-btn').forEach(btn => {
        btn.onclick = () => {
            btn.closest('.speed-row').querySelectorAll('.spd-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            speed = parseFloat(btn.dataset.r);
        };
    });

    // テキスト編集
    card.querySelectorAll('.text-display').forEach(div => {
        div.onclick = () => {
            const aType = div.dataset.type;
            const cur = div.classList.contains('empty') ? '' : div.textContent.trim();
            const ta = document.createElement('textarea');
            ta.className = 'text-input';
            ta.value = cur;
            const row = document.createElement('div');
            row.className = 'text-edit-row';
            const ok = document.createElement('button');
            ok.className = 'text-ok-btn'; ok.textContent = '✓ 確認';
            ok.onclick = async () => {
                const field = aType === 'student' ? 'studentText' : 'teacherText';
                const d = await api({ action: 'updateExercise', topicId: topic.id, exerciseId: ex.exerciseId, field, value: ta.value });
                if (d.success) { msg('保存しました', 'success', 'msgExercise'); loadExercises(); }
                else msg('エラー: ' + d.error, 'error', 'msgExercise');
            };
            const cancel = document.createElement('button');
            cancel.className = 'text-cancel-btn'; cancel.textContent = '✕ キャンセル';
            cancel.onclick = () => loadExercises();
            row.appendChild(ok); row.appendChild(cancel);
            div.replaceWith(ta); ta.after(row); ta.focus();
        };
    });

    // 録音
    card.querySelectorAll('.rec-btn').forEach(btn => {
        btn.onclick = () => {
            if (R.active) stopRec();
            else startRec(ex.exerciseId, btn.dataset.type, btn);
        };
    });

    return card;
}

// ---- 録音 ----
async function startRec(exId, aType, btn) {
    if (R.active) return;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        R.recorder = new MediaRecorder(stream);
        R.chunks = [];
        R.active = true;
        R.btn = btn;
        R.exId = exId;
        R.aType = aType;

        R.recorder.ondataavailable = e => { if (e.data.size > 0) R.chunks.push(e.data); };
        R.recorder.start(100);

        btn.textContent = '⏹️ 停止';
        btn.classList.add('recording');
    } catch(e) {
        msg('マイクエラー: ' + e.message, 'error', 'msgExercise');
    }
}

function stopRec() {
    if (!R.active || !R.recorder) return;
    R.active = false;

    const btn = R.btn;
    btn.textContent = '⏫ 保存中...';
    btn.classList.remove('recording');
    btn.disabled = true;

    R.recorder.onstop = async () => {
        const blob = new Blob(R.chunks, { type: 'audio/webm' });
        R.recorder.stream.getTracks().forEach(t => t.stop());
        R.recorder = null;

        // Blob → base64
        const reader = new FileReader();
        reader.onload = async e => {
            const base64 = e.target.result.split(',')[1];
            const field = R.aType === 'student' ? 'studentAudio' : 'teacherAudio';
            try {
                const d = await api({
                    action: 'updateExercise',
                    topicId: topic.id,
                    exerciseId: R.exId,
                    field,
                    value: base64
                });
                if (d.success) { msg('録音を保存しました！', 'success', 'msgExercise'); loadExercises(); }
                else msg('保存エラー: ' + d.error, 'error', 'msgExercise');
            } catch(e) {
                msg('エラー: ' + e.message, 'error', 'msgExercise');
            } finally {
                btn.textContent = '🎤 録音';
                btn.disabled = false;
            }
        };
        reader.readAsDataURL(blob);
    };

    R.recorder.stop();
}
</script>
</body>
</html>
